<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Setup Screen - TABU LUXE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#000000",
                        "surface-container-high": "#282a2b",
                        "primary-container": "#1e40af",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#d6a9ff",
                        "on-tertiary-fixed": "#380d00",
                        "on-tertiary-container": "#ffa583",
                        "inverse-primary": "#3755c3",
                        "on-surface": "#e2e2e2",
                        "surface-container-low": "#1a1c1c",
                        "on-error": "#690005",
                        "primary-fixed": "#dde1ff",
                        "surface-bright": "#37393a",
                        "error": "#ffb4ab",
                        "primary": "#b8c4ff",
                        "on-background": "#e2e2e2",
                        "tertiary-fixed-dim": "#ffb59a",
                        "tertiary-container": "#872d00",
                        "on-primary-fixed-variant": "#173bab",
                        "secondary-fixed": "#f0dbff",
                        "surface-container": "#1e2020",
                        "error-container": "#93000a",
                        "outline": "#8e909f",
                        "outline-variant": "#444653",
                        "secondary-container": "#6f00be",
                        "on-primary-container": "#a8b8ff",
                        "on-primary": "#002584",
                        "on-tertiary-fixed-variant": "#802a00",
                        "on-surface-variant": "#c4c5d5",
                        "secondary": "#ddb7ff",
                        "secondary-fixed-dim": "#ddb7ff",
                        "surface-variant": "#333535",
                        "surface-container-lowest": "#0c0f0f",
                        "on-tertiary": "#5a1b00",
                        "surface-dim": "#121414",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-secondary": "#490080",
                        "inverse-on-surface": "#2f3131",
                        "tertiary-fixed": "#ffdbce",
                        "tertiary": "#ffb59a",
                        "surface-container-highest": "#333535",
                        "surface": "#121414",
                        "on-primary-fixed": "#001453",
                        "surface-tint": "#b8c4ff",
                        "inverse-surface": "#e2e2e2",
                        "on-secondary-fixed": "#2c0051",
                        "on-secondary-fixed-variant": "#6900b3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "container-padding": "24px",
                        "gutter": "16px",
                        "card-gap": "20px",
                        "safe-area-bottom": "32px"
                    },
                    "fontFamily": {
                        "title-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display": ["Inter"]
                    },
                    "fontSize": {
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "300" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "300" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "300" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "300" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "300" }],
                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "200" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle Container Panel */
        .glass-panel {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Sleek Button */
        .primary-btn {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(184, 196, 255, 0.2);
            box-shadow: inset 0 0 12px rgba(184, 196, 255, 0.05);
            transition: all 0.2s ease;
        }

        .primary-btn:active {
            transform: scale(0.98);
            box-shadow: inset 0 0 16px rgba(184, 196, 255, 0.1);
        }

        /* Toggle/Pill Selection */
        .option-pill {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }
        
        .option-pill.active {
            border-color: theme('colors.primary');
            background: rgba(184, 196, 255, 0.05);
            color: theme('colors.primary');
            box-shadow: 0 0 8px rgba(184, 196, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen w-full relative overflow-x-hidden pb-safe-area-bottom">
<!-- Top App Bar (From Shared Components) -->
<header class="bg-black/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-white/5 flex items-center justify-between px-container-padding h-16">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display text-headline-lg-mobile text-primary uppercase tracking-[0.2em]">TABU LUXE</h1>
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 flex items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-container-padding md:w-[600px] md:mx-auto pb-32 flex flex-col gap-12">
<!-- Section: Teams -->
<section class="flex flex-col gap-6">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-center">Takım İsimleri</h2>
<div class="glass-panel rounded-xl p-6 flex flex-col gap-6 relative overflow-hidden">
<!-- Decorative subtle line connecting the inputs -->
<div class="absolute left-8 top-12 bottom-12 w-px bg-white/5 hidden sm:block"></div>
<div class="flex flex-col gap-2 relative z-10">
<label class="font-label-caps text-label-caps text-primary/80 pl-2" for="team1">Takım 1</label>
<div class="relative bg-white/[0.03] backdrop-blur-md border border-white/10 rounded-lg flex items-center px-4 py-3 focus-within:border-primary/40 transition-colors">
<input class="bg-transparent border-none w-full font-title-md text-white focus:ring-0 p-0 placeholder:text-white/20" id="team1" placeholder="Alfa Takımı" type="text"/>
<span class="material-symbols-outlined text-white/30 ml-2">group</span>
</div>
</div>
<div class="flex flex-col gap-2 relative z-10">
<label class="font-label-caps text-label-caps text-secondary/80 pl-2" for="team2">Takım 2</label>
<div class="relative bg-white/[0.03] backdrop-blur-md border border-white/10 rounded-lg flex items-center px-4 py-3 focus-within:border-secondary/40 transition-colors">
<input class="bg-transparent border-none w-full font-title-md text-white focus:ring-0 p-0 placeholder:text-white/20" id="team2" placeholder="Beta Takımı" type="text"/>
<span class="material-symbols-outlined text-white/30 ml-2">group</span>
</div>
</div>
</div>
</section>
<!-- Section: Game Settings -->
<section class="flex flex-col gap-6">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-center">Oyun Ayarları</h2>
<div class="glass-panel rounded-xl p-6 flex flex-col gap-8">
<!-- Setting: Süre -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-white/80 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 0;">timer</span>
                            Süre (Saniye)
                        </span>
</div>
<div class="flex gap-3 w-full">
<button class="option-pill flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'time')">60</button>
<button class="option-pill active flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'time')">90</button>
<button class="option-pill flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'time')">120</button>
</div>
</div>
<!-- Divider -->
<div class="h-px w-full bg-white/5"></div>
<!-- Setting: Pas Hakkı -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-white/80 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 0;">skip_next</span>
                            Pas Hakkı
                        </span>
</div>
<div class="flex gap-3 w-full">
<button class="option-pill flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'pass')">3</button>
<button class="option-pill active flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'pass')">5</button>
<button class="option-pill flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'pass')">Sınırsız</button>
</div>
</div>
<!-- Divider -->
<div class="h-px w-full bg-white/5"></div>
<!-- Setting: Hedef Skor -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-white/80 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 0;">sports_score</span>
                            Hedef Skor
                        </span>
</div>
<div class="flex gap-3 w-full">
<button class="option-pill flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'score')">30</button>
<button class="option-pill active flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'score')">50</button>
<button class="option-pill flex-1 py-3 rounded-lg font-body-md text-body-md" onclick="selectOption(this, 'score')">100</button>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 w-full px-container-padding py-6 pb-safe-area-bottom bg-gradient-to-t from-black via-black/90 to-transparent z-40 md:w-[600px] md:left-1/2 md:-translate-x-1/2 flex justify-center">
<button class="primary-btn w-[280px] py-4 rounded-full flex items-center justify-center gap-3 text-white font-title-md text-title-md tracking-wide">
<span>Hazırız!</span>
<span class="material-symbols-outlined text-primary">play_arrow</span>
</button>
</div>
<script>
        // Simple JS for interaction demonstration
        function selectOption(button, group) {
            // Find all buttons in the same flex container
            const container = button.parentElement;
            const buttons = container.querySelectorAll('.option-pill');
            
            // Remove active class from all
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Add active class to clicked
            button.classList.add('active');
        }
    </script>
</body></html>

<style>
        body {
            background-color: #000000; /* Pure black as per brand guidance */
            color: #e2e2e2;
            overflow: hidden; /* For splash screen immersion */
        }
        
        .glow-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(184, 196, 255, 0.2) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: 0;
            animation: pulse-glow 4s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .glass-btn-primary {
            background: linear-gradient(180deg, rgba(184, 196, 255, 0.15) 0%, rgba(184, 196, 255, 0.05) 100%);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.3);
            color: theme('colors.primary');
            transition: all 0.3s ease;
        }

        .glass-btn-primary:hover, .glass-btn-primary:active {
            background: linear-gradient(180deg, rgba(184, 196, 255, 0.25) 0%, rgba(184, 196, 255, 0.1) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 4px 12px rgba(0,0,0,0.6), 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(184, 196, 255, 0.2);
            transform: translateY(-2px);
        }

        .glass-btn-secondary {
            background: transparent;
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface');
            transition: all 0.3s ease;
        }

        .glass-btn-secondary:hover, .glass-btn-secondary:active {
            border-color: theme('colors.primary');
            box-shadow: 0 0 15px rgba(184, 196, 255, 0.15);
            color: theme('colors.primary');
        }
        
        .glass-btn-icon {
            background: transparent;
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface-variant');
            transition: all 0.3s ease;
        }
        
        .glass-btn-icon:hover {
            border-color: theme('colors.primary');
            color: theme('colors.primary');
            box-shadow: 0 0 15px rgba(184, 196, 255, 0.15);
        }

        /* Nav suppression applied - this is a splash/home screen intent */
    </style>

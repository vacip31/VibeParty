</div>

</div>

</div>
<!-- Stats details -->
<div class="w-full space-y-3">
<div class="flex justify-between items-center text-xs font-light">
<span class="text-white/40">Doğru</span>
<span class="text-white/90">42</span>
</div>
<div class="flex justify-between items-center text-xs font-light">

</div>

</div>
